<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boids | Cinematic Flocking Simulation</title>
    <link rel="stylesheet" href="style.css">

    <!-- Base Three.js -->
    <script src="https://unpkg.com/three@0.132.2/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/controls/OrbitControls.js"></script>

    <!-- Post-processing Core -->
    <script src="https://unpkg.com/three@0.132.2/examples/js/postprocessing/Pass.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/postprocessing/EffectComposer.js"></script>

    <!-- Shaders & Effects -->
    <script src="https://unpkg.com/three@0.132.2/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.132.2/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>

<body>
    <div id="title">Boids Simulation</div>

    <div id="left-panel" class="panel-container">
        <div id="info" class="glass-panel">
            <strong>Simulation Data</strong>
            <div class="stats-row"><span>Boids:</span> <span id="boidCount">0</span></div>
            <div class="stats-row"><span>FPS:</span> <span id="fps">0</span></div>
            <div class="button-group">
                <button id="addBoids">+50 Boids</button>
                <button id="removeBoids">-50</button>
            </div>
        </div>

        <div id="controls" class="glass-panel">
            <div class="control-section">
                <div class="control-header" onclick="toggleSection(this)">
                    <span>🎮 Simulation</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="control-content">
                    <button id="pauseResume">Pause</button>
                    <button id="reset">Reset Simulation</button>
                    <button id="fps-view">Follow Boid</button>
                </div>
            </div>

            <div class="control-section">
                <div class="control-header" onclick="toggleSection(this)">
                    <span>🐟 Flocking Rules</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="control-content">
                    <div class="slider-container">
                        <div class="slider-label"><span>Separation</span><span id="separation-value">2.0</span></div>
                        <input type="range" id="separation" min="0" max="5" step="0.1" value="2.0">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Alignment</span><span id="alignment-value">1.4</span></div>
                        <input type="range" id="alignment" min="0" max="5" step="0.1" value="1.4">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Cohesion</span><span id="cohesion-value">1.1</span></div>
                        <input type="range" id="cohesion" min="0" max="5" step="0.1" value="1.1">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="right-panel" class="panel-container">
        <div class="glass-panel" id="right-controls">
            <!-- Ecosystem Section -->
            <div class="control-section">
                <div class="control-header collapsed" onclick="toggleSection(this)">
                    <span>🌊 Ecosystem</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="control-content collapsed">
                    <div class="slider-container">
                        <div class="slider-label"><span>Small Fish %</span><span id="small-fish-value">50</span>
                        </div>
                        <input type="range" id="small-fish" min="0" max="100" step="5" value="50">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Large Fish %</span><span id="large-fish-value">30</span>
                        </div>
                        <input type="range" id="large-fish" min="0" max="100" step="5" value="30">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Bloom Intensity</span><span id="bloom-value">1.8</span>
                        </div>
                        <input type="range" id="bloom" min="0" max="5" step="0.1" value="1.8">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Point Light</span><span id="point-light-value">5.0</span>
                        </div>
                        <input type="range" id="point-light" min="0" max="10" step="0.5" value="5.0">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Vignette</span><span id="vignette-value">1.0</span>
                        </div>
                        <input type="range" id="vignette" min="0" max="2" step="0.1" value="1.0">
                    </div>
                    <div class="slider-container">
                        <div class="slider-label"><span>Ambient Light</span><span id="ambient-value">0.6</span>
                        </div>
                        <input type="range" id="ambient" min="0" max="1" step="0.1" value="0.6">
                    </div>
                </div>
            </div>

            <!-- Features Section -->
            <div class="control-section">
                <div class="control-header" onclick="toggleSection(this)">
                    <span>⚙️ Features</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="control-content">
                    <label class="toggle-row"><input type="checkbox" id="toggle-mouse" checked> <span>Mouse Interaction</span></label>
                    <label class="toggle-row"><input type="checkbox" id="toggle-trails" checked> <span>Enable
                            Trails</span></label>
                    <label class="toggle-row"><input type="checkbox" id="toggle-food" checked> <span>Enable Food
                            System</span></label>
                    <label class="toggle-row"><input type="checkbox" id="toggle-predators" checked> <span>Enable
                            Predators</span></label>
                </div>
            </div>

            <!-- Audio Reactivity Section -->
            <div class="control-section" style="margin-bottom: 0;">
                <div class="control-header" onclick="toggleSection(this)">
                    <span>🎵 Audio Reactivity</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="control-content">
                    <button id="enable-audio">Enable Microphone</button>
                    <div class="slider-container" style="margin-top: 10px;">
                        <div class="slider-label"><span>Sensitivity</span><span id="audio-sensitivity-value">1.0</span>
                        </div>
                        <input type="range" id="audio-sensitivity" min="0" max="3" step="0.1" value="1.0">
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
